services:
  todo-app-postgres:
    image: postgres:18.3-bookworm
    container_name: todoapp-env-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ${PROJECT_ROOT}/out/pgdata:/var/lib/postgresql
    restart: always


  todo-app-migrate:
    image: migrate/migrate:v4.19.1
    volumes:
      - ${PROJECT_ROOT}/migrations:/migrations

  port-forwarder:
    image: alpine/socat:1.8.0.3
    container_name: todo-app-postgres-port-forwarder
    command: tcp-listen:5432,fork,reuseaddr tcp-connect:todo-app-postgres:5432
    ports:
      - "127.0.0.1:5433:5432"